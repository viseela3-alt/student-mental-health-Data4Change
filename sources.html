<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sources · My Data Capstone Project</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --text: #1e293b;
      --muted: #64748b;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      padding: 1rem 0;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      margin-left: 2rem;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-links a.active,
    .nav-links a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .page-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2.5rem;
      text-align: center;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .section-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent-light);
    }

    .source-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
    }

    .source-icon {
      min-width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .source-content { flex: 1; }

    .source-type {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }

    .source-content h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .source-content p {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .source-content a {
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }

    .source-content a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">Capstone Project</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="graphs.html">Graphs</a>
      <a href="sources.html" class="active">Sources</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>Source</h1>
  </div>

  <div class="container">

    <h2 class="section-heading">📊 Dataset</h2>

    <div class="source-card">
      <div class="source-icon">📁</div>
      <div class="source-content">
        <div class="source-type">Primary Dataset</div>
        <h3>Income Dataset</h3>
        <p>The dataset used in this project is the 'Income Dataset' from Kaggle. It can be accessed at:</p>
        <a href="https://www.kaggle.com/datasets/mastmustu/income" target="_blank">
          https://www.kaggle.com/datasets/mastmustu/income →
        </a>
      </div>
    </div>

  </div>

  <footer>
    Created by Jane Smith · Data4Change · 2026
  </footer>

</body>
</html>
